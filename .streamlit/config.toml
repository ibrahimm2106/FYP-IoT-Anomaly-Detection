[browser]
gatherUsageStats = false

[theme]
# Aligns with src/ui_theme.py (teal accent, light surfaces, readable text).
# Injected CSS uses "Source Sans 3" first; Streamlit theme font stays generic sans-serif.
base = "light"
primaryColor = "#0f766e"
backgroundColor = "#f4f7fb"
secondaryBackgroundColor = "#ffffff"
textColor = "#0f172a"
font = "sans serif"
