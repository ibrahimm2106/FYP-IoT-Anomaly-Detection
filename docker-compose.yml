# Run from the project root so bind mounts resolve to your host data/models.
# First build can take several minutes (TensorFlow download).
services:
  iot-app:
    build: .
    image: iot-autoencoder-artifact:latest
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    restart: unless-stopped
